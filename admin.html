<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Premium Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header>
        <div class="logo">ADMIN DASHBOARD</div>
        <nav>
            <ul>
                <li><a href="index.html">View Store</a></li>
                <li><a href="admin.html" class="active">Admin Panel</a></li>
            </ul>
        </nav>
    </header>

    <div class="admin-container">
        <div class="admin-header">
            <h2>Manage Services</h2>
            <div>
                <button class="btn" style="margin-right: 10px;" onclick="toggleForm()">+ Add New</button>
                <button class="btn btn-danger" onclick="resetDatabase()">Reset Database</button>
            </div>
        </div>

        <!-- Add/Edit Form -->
        <div id="product-form" style="display: none; background: rgba(0,0,0,0.4); padding: 30px; border-radius: 15px; margin-bottom: 30px; border: 1px solid var(--accent-color); box-shadow: 0 0 20px rgba(168, 85, 247, 0.1);">
            <h3 id="form-title" style="margin-bottom: 20px; font-size: 22px;">Add Service</h3>
            <input type="hidden" id="p-id">
            
            <div class="form-group">
                <label>Service Name</label>
                <input type="text" id="p-name" placeholder="e.g. Netflix Premium">
            </div>
            
            <div class="form-group">
                <label>Category</label>
                <select id="p-category">
                    <option value="discord">Discord & Gaming</option>
                    <option value="streaming">Streaming Services</option>
                    <option value="utility">Utilities & Accounts</option>
                    <option value="domain">Web & Server Domains</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Price Display</label>
                <input type="text" id="p-price" placeholder="e.g. ₹150 / Month">
            </div>
            
            <div class="form-group">
                <label>Features (Comma separated)</label>
                <textarea id="p-features" rows="3" placeholder="4K Ultra HD, 1 Screen, Warranty"></textarea>
            </div>
            
            <div class="form-group">
                <label>Image/Emoji (Paste Discord Link or Emoji)</label>
                <input type="text" id="p-img" placeholder="https://... or 🎬">
            </div>
            
            <button class="btn" style="margin-right: 10px;" onclick="saveProductData()">Save Product</button>
            <button class="btn btn-danger" onclick="toggleForm()">Cancel</button>
        </div>

        <!-- Products Table -->
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let products = getProducts();
        const formDiv = document.getElementById('product-form');

        function renderTable() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            products.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td>${p.id}</td>
                        <td style="font-weight: 600;">${p.name}</td>
                        <td><span style="background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; font-size: 12px; text-transform: uppercase;">${p.category}</span></td>
                        <td style="font-family: var(--font-mono); color: var(--price-color);">${p.price}</td>
                        <td>
                            <button class="btn btn-small" style="margin-right: 5px;" onclick="editProduct(${p.id})">Edit</button>
                            <button class="btn btn-small btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        function toggleForm() {
            formDiv.style.display = formDiv.style.display === 'none' ? 'block' : 'none';
            if(formDiv.style.display === 'none') resetForm();
        }

        function resetForm() {
            document.getElementById('p-id').value = '';
            document.getElementById('p-name').value = '';
            document.getElementById('p-category').value = 'discord';
            document.getElementById('p-price').value = '';
            document.getElementById('p-features').value = '';
            document.getElementById('p-img').value = '';
            document.getElementById('form-title').innerText = 'Add Service';
        }

        function saveProductData() {
            const idVal = document.getElementById('p-id').value;
            const newProduct = {
                id: idVal ? parseInt(idVal) : Date.now(),
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-category').value,
                price: document.getElementById('p-price').value,
                features: document.getElementById('p-features').value,
                img: document.getElementById('p-img').value || '📦'
            };

            if (idVal) {
                const index = products.findIndex(p => p.id === parseInt(idVal));
                products[index] = newProduct;
            } else {
                products.push(newProduct);
            }

            saveProducts(products);
            renderTable();
            toggleForm();
        }

        function editProduct(id) {
            const p = products.find(prod => prod.id === id);
            document.getElementById('p-id').value = p.id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-category').value = p.category;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-features').value = p.features;
            document.getElementById('p-img').value = p.img;
            
            document.getElementById('form-title').innerText = 'Edit Service';
            formDiv.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteProduct(id) {
            if(confirm('Are you sure you want to delete this service?')) {
                products = products.filter(p => p.id !== id);
                saveProducts(products);
                renderTable();
            }
        }
        
        function resetDatabase() {
            if(confirm('This will restore all default products and domains. Proceed?')) {
                localStorage.removeItem('bm_products');
                products = getProducts();
                renderTable();
            }
        }

        document.addEventListener('DOMContentLoaded', renderTable);
    </script>
</body>
</html>
